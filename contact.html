<!DOCTYPE html>
<html lang="ja">

<head prefix="og: https://ogp.me/ns#">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="format-detection" content="telephone=no, email=no" />
  <title>きたむらミュージックスクール</title>
  <meta name="description" content="ミュージックスクール ホームページ" />
  <meta name="keywords" content="ホームページ制作 webデザイン" />
  <meta name="robots" content="noindex" />

  <!-- OGP設定 -->
  <meta property="og:title" content="ミュージックスクール" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://サムネイル">
  <meta property="og:url" content="ページのURL" />
  <link rel="canonical" href="ページのURL">
  <meta property="og:description" content="どんなスクールかご紹介します" />
  <meta property="og:site_name" content="きたむらミュージックスクール" />
  <meta property="og:locale" content="ja_JP" />

  <!-- google font設定 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&family=Noto+Serif+JP:wght@200..900&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="./css/reset.css" />
  <!-- SwiperのCSSを読み込み -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
<!-- -------------ヘッダー----------------- -->
<header class="l-header">
  <div class="l-header__inner l-header-inner inner">
    <div class="l-header__title">
      <h1>
        <a href="#">
          <span class="l-header__logo">
            <img src="./images/logo-red.png" alt="音符のアイコン">
          </span>
          <span class="l-header__name">
            <span class="l-header__name-main">きたむら<br class="pc-only"></span>
            <span class="l-header__name-sub">ミュージックスクール</span>
          </span>
        </a>
      </h1>
    </div>
    <div class="l-header__right">
      <!-- ハンバーガーボタン -->
      <div class="hamburger sp-only" aria-label="メニュー">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <ul class="l-header__nav l-header-nav">
        <li>
          <a href="" class="l-header-nav-link">料金</a>
        </li>
        <li>
          <a href="" class="l-header-nav-link">ブログ</a>
        </li>
        <li>
          <a href="" class="l-header-nav-link">卒業実績</a>
        </li>
      </ul>
      <a href="" class="l-header__contact pc-only c-contact-btn">お問い合わせ</a>
    </div>
  </div>

</header>

<main>

  <section class="p-top-fv p-plan-fv">
    <div class="p-plan-fv__image">
      <picture>
        <source media="(min-width:768px)" srcset="./images/Contact.jpg">
        <img src="./images/Contact-sp.jpg" alt="ギターとパソコン">
      </picture>

    </div>
    <h2 class="p-plan-fv-catch">
      お問い合わせ
    </h2>
  </section>

  <!-- パンくずリスト -->
  <div class="c-breadcrumbs">
    <div class="inner">
      <ol class="c-breadcrumbs__list">
        <li>
          <a href="">
            <span>ホーム</span>
          </a>
        </li>
        <li>
          <a href="">
            <span>お問い合わせ</span>
          </a>
        </li>
      </ol>
    </div>
  </div>

  <section class="p-contact-form">
    <div class="inner">
      <form action="" method="post">
        <div class="p-contact-form__text">
          <p>当校に関するご質問・ご相談・資料請求は下記のフォームからお気軽にお問い合わせください。<br>
            通常３営業日以内にメールにてご連絡させていただきます。</p>
        </div>
        <div class="p-contact-form__items">
          <dl class="p-contact-form__item flex-dl">
            <dt class="p-contact-form__label">
              <label for="company">会社名</label>
            </dt>
            <dd class="p-contact-form__input">
              <input type="text" name="company" id="company" placeholder="きたむらミュージックスクール">
            </dd>
          </dl>

          <dl class="p-contact-form__item">
            <dt class="p-contact-form__label">
              <label for="name">お名前</label>
            </dt>
            <dd class="p-contact-form__input">
              <input type="text" name="name" id="name" placeholder="北村　翔平" />
            </dd>
          </dl>

          <dl class="p-contact-form__item">
            <dt class="p-contact-form__label">
              <label for="email">メールアドレス</label>
            </dt>
            <dd class="p-contact-form__input">
              <input type="email" name="email" id="email" placeholder="info@kitamura.musicschool.jp">
            </dd>
          </dl>

          <dl class="p-contact-form__item">
            <dt class="p-contact-form__label">
              <label for="tel">電話番号</label>
            </dt>
            <dd class="p-contact-form__input">
              <input type="tel" name="tel" id="tel" placeholder="090-1234-5678">
            </dd>
          </dl>

          <dl class="p-contact-form__item">
            <dt class="p-contact-form__label">
              <label>目　的<br>(複数選択可)</label>
            </dt>

            <dd class="p-contact-form__input form-checkbox">
              <div class="form-checkbox">
                <label>
                  <input type="checkbox" name="purpose[]" value="plan">
                  <span>プランについてのお問い合わせ</span>
                </label>
                <label>
                  <input type="checkbox" name="purpose[]" value="hearing">
                  <span>ヒアリングのご予約</span>
                </label>
                <label>
                  <input type="checkbox" name="purpose[]" value="request">
                  <span>資料請求</span>
                </label>
                <label>
                  <input type="checkbox" name="purpose[]" value="other">
                  <span>その他</span>
                </label>

              </div>
            </dd>
          </dl>

          <dl class="p-contact-form__input form-detail">
            <dt class="p-contact-form__label">
              <label for="content">内　容</label>
            </dt>
            <dd class="p-contact-form__textarea">
              <textarea name="content" id="content" rows="5" placeholder="内容に関する詳細や備考等をご入力ください。" required></textarea>
            </dd>
          </dl>

          <div class="p-contact-form__submit">
            <button type="submit">送信する</button>
          </div>



        </div>
      </form>
    </div>
  </section>

  <!-- ------------------フィックスエリア トップに戻るボタン--------------------   -->
  <div class="p-fixed-area">

    <div class="c-top-btn p-top-blog-btn">
      <a href="#" class="c-top-btn__arrow">
        <span>
          <img src="./images/top-back-arrow.svg" alt="トップに戻るボタン矢印">
        </span>
      </a>
    </div>
    <!-- <a href="" class="c-contact-btn c-contact-btn--fixed">お問い合わせ</a> -->

  </div>

</main>
<!-- -----------------フッター-------------------    -->

<footer>
  <div class="l-footer">
    <div class="inner">
      <ul class="l-footer__nav">
        <li>
          <a href="">ホーム</a>
        </li>
        <li>
          <a href="">料金</a>
        </li>
        <li>
          <a href="">ブログ</a>
        </li>
        <li>
          <a href="">卒業実績</a>
        </li>
      </ul>
      <div class="l-footer__logo">
        <img src="./images/logo-white.png" alt="白の音符のアイコン">
      </div>
      <div class="l-footer__copyright">
        Copyright &copy; 0000 KITAMURA music school Inc. All Rights
      </div>
      <div class="l-footer-sns sns">
        <a href="" class="l-sns__link" target="_blank" rel="noopener noreferrer">
          <img src="images/icon-twitter.svg" alt="x" /></a>
        <a href="" class="l-sns__link" target="_blank" rel="noopener noreferrer">
          <img src="images/icon-facebook.svg" alt="facebook" /></a>
        <a href="" class="l-sns__link" target="_blank" rel="noopener noreferrer">
          <img src="images/icon-youtube.svg" alt="youtube" /></a>
        <a href="" class="l-sns__link" target="_blank" rel="noopener noreferrer">
          <img src="images/icon-instagram.svg" alt="instagram" /></a>

      </div>
    </div>
  </div>

</footer>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- JSを読み込む  -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="./js/script.js"></script>
</body>

</html>
